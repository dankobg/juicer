  /me/friend-requests:
    get:
      operationId: listFriendRequests
      summary: List friend requests
      description: List my friend requests
      security:
        - cookieAuth: []
      tags:
        - juicer
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationPageSize"
        - in: query
          name: username
          description: Filter friend requests by username (partial match)
          required: false
          schema:
            type: string
        - in: query
          name: direction
          description: Filter friend requests by direction (incoming or outgoing)
          required: false
          schema:
            type: string
            enum:
              - incoming
              - outgoing
        - name: id
          in: query
          description: Filter friends by ids
          required: false
          schema:
            type: array
            items:
