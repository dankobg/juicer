          schema:
            type: string
        - description: >-
            Include Credentials in Response

            Include any credential, for example `password` or `oidc`, in the
            response. When set to `oidc`, This will return

            the initial OAuth 2.0 Access Token, OAuth 2.0 Refresh Token and the
            OpenID Connect ID Token if available.
          in: query
          name: include_credential
          schema:
            items:
              enum:
                - password
                - oidc
                - totp
                - lookup_secret
                - webauthn
                - code
                - passkey
                - profile
                - saml
                - link_recovery
                - code_recovery
              type: string
            type: array
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Identity"
          description: identity
        "401":
          $ref: "#/components/responses/UnauthenticatedErrorResponse"
        "403":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
