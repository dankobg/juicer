      in: query
      name: page
      required: false
      schema:
        $ref: "#/components/schemas/PaginationPage"
      description: Page number (1-based)
    PaginationPageSize:
      in: query
      name: page_size
      required: false
      schema:
        $ref: "#/components/schemas/PaginationPageSize"
      description: Number of items per page

  schemas:
    PaginationPage:
      type: integer
      minimum: 1
      default: 1
      description: Page number (1-based)
    PaginationPageSize:
      type: integer
      minimum: 1
      maximum: 1000
      default: 50
      description: Number of items per page
    PaginationMeta:
      type: object
      required:
        - page
        - page_size
        - total
      properties:
        page:
          $ref: "#/components/schemas/PaginationPage"
        page_size:
          $ref: "#/components/schemas/PaginationPageSize"
        total:
          type: integer
          format: int64
    PaginationParams:
      type: object
      required:
        - page
        - page_size
      properties:
        page:
          $ref: "#/components/schemas/PaginationPage"
        page_size:
          $ref: "#/components/schemas/PaginationPageSize"
