        default:
          $ref: "#/components/responses/UnexpectedErrorResponse"
    post:
      operationId: createFriendRequest
      summary: Create friend request
      description: Create friend request
      security:
        - cookieAuth: []
      tags:
        - juicer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFriendRequestBody"
      responses:
        "201":
