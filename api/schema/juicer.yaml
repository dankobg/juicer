openapi: 3.0.2
servers:
  - url: "/api/v1"
    description: Juicer development server
info:
  version: 1.0.0
  title: Juicer schema
tags:
  - name: juicer
    description: Everything about juicer
paths:
  /health/alive:
    get:
      operationId: getHealthAlive
      summary: Check if server is healthy
      description: Checks if the server is healthy
      tags:
        - juicer
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Healthy"
        default:
          $ref: "#/components/responses/UnexpectedErrorResponse"
  /health/ready:
    get:
      operationId: getHealthReady
      summary: Check if server is ready
      description: Checks if the server is ready
      tags:
        - juicer
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ready"
        default:
          $ref: "#/components/responses/UnexpectedErrorResponse"
  /game-variants:
    get:
      operationId: listGameVariants
      summary: List game variants
      description: List game variants
      tags:
        - juicer
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationPageSize"
        - name: id
          in: query
          description: Filter game variants by ids
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
        - name: name
          in: query
          description: Filter game variants by name (partial match)
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Sort by fields (add prefix `-` for descending e.g. -created_at)
          required: false
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GameVariant"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/UnauthenticatedErrorResponse"
        "403":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        default:
          $ref: "#/components/responses/UnexpectedErrorResponse"
  /game-time-categories:
    get:
      operationId: listGameTimeCategories
