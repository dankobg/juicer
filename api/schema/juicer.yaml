          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequest"
        "400":
          $ref: "#/components/responses/GenericErrorResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedErrorResponse"
        "403":
          $ref: "#/components/responses/UnauthorizedErrorResponse"
        "404":
