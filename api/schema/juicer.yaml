  /games:
    get:
      operationId: listGames
      summary: List games
      description: List games
      tags:
        - juicer
      parameters:
        - $ref: "#/components/parameters/PaginationPage"
        - $ref: "#/components/parameters/PaginationPageSize"
        - name: id
          in: query
          description: Filter games by ids
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64

        - name: game_variant_id
          in: query
          description: Filter games by game variant id
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
        - name: game_time_kind_id
          in: query
          description: Filter games by game time kind id
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
        - name: game_time_category_id
          in: query
          description: Filter games by game time category id
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
        - name: game_result_id
          in: query
          description: Filter games by game result id
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
        - name: game_result_status_id
          in: query
          description: Filter games by game result status id
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
        - name: game_state_id
          in: query
          description: Filter games by game state id
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
        - name: rated
          in: query
          description: Filter games by rated flag
          required: false
          schema:
            type: boolean
        - name: created_at_from
          in: query
          description: Filter games by from timestamp
          required: false
          schema:
            type: string
            format: date-time
        - name: created_at_to
          in: query
          description: Filter games by up to that timestamp
          required: false
          schema:
            type: string
            format: date-time
        - name: sort
          in: query
          description: Sort by fields (add prefix `-` for descending e.g. -created_at)
          required: false
          explode: false
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Successful operation
