---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kratos
  labels:
    app.kubernetes.io/name: kratos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kratos
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kratos
    spec:
      initContainers:
        - name: kratos-migrate
          image: oryd/kratos:v0.13.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: kratos-conf
            - secretRef:
                name: kratos-secret
          volumeMounts:
            - name: kratos-config
              mountPath: /etc/config/kratos
            - name: kratos-identity-schemas
              mountPath: /etc/config/kratos/schemas
            - name: kratos-oidc-schemas
              mountPath: /etc/config/kratos/oidc
            - name: kratos-hooks
              mountPath: /etc/config/kratos/hooks
            - name: kratos-imports
              mountPath: /etc/config/kratos/imports
            - name: kratos-courier-templates
              mountPath: /etc/config/kratos/courier-templates
          command:
            - kratos
            - migrate
            - sql
            - --yes
            - --read-from-env
            - --config
            - /etc/config/kratos/kratos.yaml
      containers:
        - name: kratos
          image: oryd/kratos:v0.13.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ENV
              value: production
          ports:
            - name: kratos-public
              containerPort: 4433
              protocol: TCP
            - name: kratos-admin
              containerPort: 4434
              protocol: TCP
          args:
            - serve
            - --config
            - /etc/config/kratos/kratos.yaml
          livenessProbe:
            httpGet:
              path: /admin/health/ready
              port: 4434
              # httpHeaders:
              #   - name: Host
              #     value: '127.0.0.1'
            failureThreshold: 5
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /admin/health/ready
              port: 4434
              # httpHeaders:
              #   - name: Host
              #     value: '127.0.0.1'
            failureThreshold: 5
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /admin/health/ready
              port: 4434
              # httpHeaders:
              #   - name: Host
              #     value: '127.0.0.1'
            failureThreshold: 60
            periodSeconds: 1
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            limits:
              memory: 512Mi
              cpu: 200m
          volumeMounts:
            - name: kratos-config
              mountPath: /etc/config/kratos
            - name: kratos-identity-schemas
              mountPath: /etc/config/kratos/schemas
            - name: kratos-oidc-schemas
              mountPath: /etc/config/kratos/oidc
            - name: kratos-hooks
              mountPath: /etc/config/kratos/hooks
            - name: kratos-imports
              mountPath: /etc/config/kratos/imports
            - name: kratos-courier-templates
              mountPath: /etc/config/kratos/courier-templates
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            seccompProfile:
              type: RuntimeDefault
      restartPolicy: Always
      volumes:
        - name: kratos-config
          configMap:
            name: kratos-config
        - name: kratos-identity-schemas
          configMap:
            name: kratos-identity-schemas
        - name: kratos-oidc-schemas
          configMap:
            name: kratos-oidc-schemas
        - name: kratos-hooks
          configMap:
            name: kratos-hooks
        - name: kratos-imports
          configMap:
            name: kratos-imports
        - name: kratos-courier-templates
          configMap:
            name: kratos-courier-templates
      serviceAccountName: kratos
      automountServiceAccountToken: true
---
apiVersion: v1
kind: Service
metadata:
  name: kratos
  labels:
    app.kubernetes.io/name: kratos
spec:
  ports:
    - name: kratos-public
      protocol: TCP
      port: 4433
      targetPort: 4433
    - name: kratos-admin
      protocol: TCP
      port: 4434
      targetPort: 4434
  selector:
    app.kubernetes.io/name: kratos
status:
  loadBalancer: {}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kratos-courier
  namespace: default
  labels:
    app.kubernetes.io/name: kratos-courier
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kratos-courier
  serviceName: kratos-courier
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kratos-courier
    spec:
      containers:
        - name: kratos-courier
          image: oryd/kratos:v0.13.0
          imagePullPolicy: IfNotPresent
          args:
            - courier
            - watch
            - --config
            - /etc/config/kratos/kratos.yaml
          envFrom:
            - configMapRef:
                name: kratos-conf
            - secretRef:
                name: kratos-secret
          resources:
            limits:
              memory: 256Mi
              cpu: 100m
          volumeMounts:
            - name: kratos-config
              mountPath: /etc/config/kratos
            - name: kratos-identity-schemas
              mountPath: /etc/config/kratos/schemas
            - name: kratos-oidc-schemas
              mountPath: /etc/config/kratos/oidc
            - name: kratos-hooks
              mountPath: /etc/config/kratos/hooks
            - name: kratos-imports
              mountPath: /etc/config/kratos/imports
            - name: kratos-courier-templates
              mountPath: /etc/config/kratos/courier-templates
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: kratos-config
          configMap:
            name: kratos-config
        - name: kratos-identity-schemas
          configMap:
            name: kratos-identity-schemas
        - name: kratos-oidc-schemas
          configMap:
            name: kratos-oidc-schemas
        - name: kratos-hooks
          configMap:
            name: kratos-hooks
        - name: kratos-imports
          configMap:
            name: kratos-imports
        - name: kratos-courier-templates
          configMap:
            name: kratos-courier-templates
      serviceAccountName: kratos
      automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kratos
  labels:
    app.kubernetes.io/name: kratos
