---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-cert
  namespace: dev
spec:
  isCA: true
  commonName: local-cert
  secretName: local-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    # - dankop.xyz
    - dankop.dev
