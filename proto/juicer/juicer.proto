syntax = "proto3";

package pb;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/dankobg/juicer/pb";

// Color is the player color
enum Color {
  COLOR_UNSPECIFIED = 0;
  COLOR_WHITE = 1;
  COLOR_BLACK = 2;
}

// Variant is game variant
enum Variant {
  VARIANT_UNSPECIFIED = 0;
  VARIANT_STANDARD = 1;
  VARIANT_ATOMIC = 2;
  VARIANT_CRAZYHOUSE = 3;
  VARIANT_CHESS960 = 4;
  VARIANT_KING_OF_THE_HILL = 5;
  VARIANT_THREE_CHECK = 6;
  VARIANT_HORDE = 7;
  VARIANT_RACING_KINGS = 8;
}

// GameTimeKind is game time kind
enum GameTimeKind {
  GAME_TIME_KIND_UNSPECIFIED = 0;
  GAME_TIME_KIND_REALTIME = 1;
  GAME_TIME_KIND_CORRESPONDENCE = 2;
  GAME_TIME_KIND_UNLIMITED = 3;
}

// GameTimeCategory is game time category
enum GameTimeCategory {
  GAME_TIME_CATEGORY_UNSPECIFIED = 0;
  GAME_TIME_CATEGORY_HYPERBULLET = 1;
  GAME_TIME_CATEGORY_BULLET = 2;
  GAME_TIME_CATEGORY_BLITZ = 3;
  GAME_TIME_CATEGORY_RAPID = 4;
  GAME_TIME_CATEGORY_CLASSICAL = 5;
}

// GameTimeControl is game time control
message GameTimeControl {
  google.protobuf.Duration clock = 1;
  google.protobuf.Duration increment = 2;
}

// GameResult is result of the game
enum GameResult {
  GAME_RESULT_UNSPECIFIED = 0;
  GAME_RESULT_WHITE_WON = 1;
  GAME_RESULT_BLACK_WON = 2;
  GAME_RESULT_DRAW = 3;
  GAME_RESULT_INTERRUPTED = 4;
}

// GameResultStatus specifies the reason of result
enum GameResultStatus {
  GAME_RESULT_STATUS_UNSPECIFIED = 0;
  GAME_RESULT_STATUS_CHECKMATE = 1;
  GAME_RESULT_STATUS_INSUFFICIENT_MATERIAL = 2;
  GAME_RESULT_STATUS_THREEFOLD_REPETITION = 3;
  GAME_RESULT_STATUS_FIVEFOLD_REPETITION = 4;
  GAME_RESULT_STATUS_FIFTY_MOVE_RULE = 5;
  GAME_RESULT_STATUS_SEVENTYFIVE_MOVE_RULE = 6;
  GAME_RESULT_STATUS_STALEMATE = 7;
  GAME_RESULT_STATUS_RESIGNATION = 8;
  GAME_RESULT_STATUS_DRAW_AGREED = 9;
  GAME_RESULT_STATUS_FLAGGED = 10;
  GAME_RESULT_STATUS_ADJUDICATION = 11;
  GAME_RESULT_STATUS_TIMED_OUT = 12;
  GAME_RESULT_STATUS_ABORTED = 13;
  GAME_RESULT_STATUS_INTERRUPTED = 14;
}

// GameState is a game state
enum GameState {
  GAME_STATE_UNSPECIFIED = 0;
  GAME_STATE_IDLE = 1;
  GAME_STATE_WAITING_START = 2;
  GAME_STATE_IN_PROGRESS = 3;
  GAME_STATE_FINISHED = 4;
  GAME_STATE_INTERRUPTED = 5;
}

// GameSideChoice is a choice when playing custom game
enum GameSideChoice {
  GAME_SIDE_CHOICE_UNSPECIFIED = 0;
  GAME_SIDE_CHOICE_RANDOM = 1;
  GAME_SIDE_CHOICE_WHITE = 2;
  GAME_SIDE_CHOICE_BLACK = 3;
}

// Message represents websocket message
message Message {
  oneof event {
    Problem problem = 1;
    ClientConnected client_connected = 2;
    ClientDisconnected client_disconnected = 3;
    RequestInitialChannels request_initial_channels = 4;
    InitialChannels initial_channels = 5;
    RequestChannelsInfo request_channels_info = 6;
    // ------------------------------------------------------
    SeekGame seek_game = 7;
    CancelSeekGame cancel_seek_game = 8;
    HubInfo hub_info = 9;
    MatchFound match_found = 10;
    GameAbort game_abort = 11;
    GameResign game_resign = 12;
    GameOfferDraw game_offer_draw = 13;
    GameAcceptDraw game_accept_draw = 14;
    GameDeclineDraw game_decline_draw = 15;
    GameChat game_chat = 16;
    GameChatReceive game_chat_receive = 17;
    GameChatRetrieve game_chat_retrieve = 18;
    PlayMoveUCI play_move_uci = 19;
    ReceiveMove receive_move = 20;
    GameFinished game_finished = 21;

    Test test = 69;
  }
}

// ########################### REMOVE LATER ########################################
message Test {
  string message = 1;
}

// Problem is the websocket error
message Problem {
  string message = 1;
}

// ClientConnected signals that client connected
message ClientConnected {
  string id = 1;
}

// ClientDisconnected signals that client disconnected
message ClientDisconnected {
  string id = 1;
}

// RequestInitialChannels requests initial channels that the user belongs to (e.g. ["lobby", "lobby.chat"])
message RequestInitialChannels {
  string client_id = 1;
  string conn_id = 2;
  string path = 3;
}

// InitialChannels is the user initial channels
message InitialChannels {
  repeated string channels = 1;
}

// RequestChannelsInfo requests backend to send some data for initial channels
// e.g. users in lobby want to see active games, lobby.chat want loby chat history, if in gametv, they want gamestate and move history etc.
message RequestChannelsInfo {
  string client_id = 1;
  string conn_id = 2;
  repeated string channels = 3;
}

// Clocks is white and black game clock
message Clocks {
  google.protobuf.Duration white = 1;
  google.protobuf.Duration black = 2;
}

// SeekGame is searching for a game
message SeekGame {
  GameTimeControl time_control = 1;
}

// CancelSeekGame cancels the game search
message CancelSeekGame {
  GameTimeControl time_control = 1;
}

// HubInfo is hub information
message HubInfo {
  int32 lobby = 1;
  int32 playing = 2;
}

// OpponentInfo is info about opponent
message OpponentInfo {
  string username = 9;
  string avatar_url = 10;
  int32 rating = 11;
}

// HistoryMove is the move played
message HistoryMove {
  string uci = 1;
  string san = 2;
}

// HistoryMoveInfo holds info about the move
message HistoryMoveInfo {
  string fen = 1;
  optional google.protobuf.Timestamp played_at = 2;
  optional HistoryMove move = 3;
  bool check = 4;
}

// MatchFound signals that the game was found
message MatchFound {
  int64 game_id = 1;
  string client_id = 2;
  GameState game_state = 3;
  Color color = 4;
  string fen = 5;
  uint32 ply = 6;
  Clocks clocks = 7;
  repeated string legal_moves = 8;
  GameTimeControl time_control = 9;
  optional OpponentInfo opponent_info = 10;
  int64 reconnect_timeout_ms = 11;
  int64 first_move_timeout_ms = 12;
  repeated HistoryMoveInfo history_move_infos = 13;
  google.protobuf.Timestamp start_time = 14;
}

// GameAbort is game abort request
message GameAbort {}

// GameResign is game resign request
message GameResign {}

// GameOfferDraw is draw offer request
message GameOfferDraw {}

// GameDeclineDraw is draw declined
message GameDeclineDraw {}

// GameAcceptDraw is accepting the draw offer
message GameAcceptDraw {}

// GameChat is the game chat
message GameChat {
  string message = 1;
}

// GameChatReceive is xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
message GameChatReceive {
  string client_id = 1;
  string id = 2;
  string message = 3;
}

// GameChatRetrieve is xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
message GameChatRetrieve {
  repeated GameChatReceive game_chat = 1;
}

// PlayMoveUCI plays a game move
message PlayMoveUCI {
  string move = 1;
}

// ReceiveMove receives the game move
message ReceiveMove {
  string uci = 1;
  string lan = 2;
  string san = 3;
  string fen = 4;
  uint32 ply = 5;
  Clocks clocks = 6;
  repeated string legal_moves = 7;
}

// GameFinished signals the game is over
message GameFinished {
  GameResult game_result = 1;
  GameResultStatus game_result_status = 2;
  GameState game_state = 3;
}
